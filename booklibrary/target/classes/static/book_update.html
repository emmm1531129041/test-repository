<script type="text/javascript" src="js/jquery.min.js"></script>

<script>
    // 页面加载
    getBookInfo();
    // 查询图书详情
    function getBookInfo() {
        let searchParams = new URLSearchParams(location.search);
        let bookId = searchParams.get("bookId");
        if (bookId == null || bookId == "") {
            alert("图书ID不能为空！");
            return;
        }
        $.ajax({
            type: "GET",
            url: "/book/queryBookById",
            data: {
                bookId: bookId
            },
            success: function (bookInfo) {
                if (bookInfo == null) {
                    alert("图书不存在！");
                    return;
                }
                $("#bookId").val(bookInfo.id);
                $("#bookName").val(bookInfo.bookName);
                $("#bookAuthor").val(bookInfo.author);
                $("#bookStock").val(bookInfo.count);
                $("#bookPrice").val(bookInfo.price);
                $("#bookPublisher").val(bookInfo.publish);
                $("#bookStatus").val(bookInfo.status);
            },
            error: function () {
                alert("获取图书信息失败！");
            }
        });
    }
    // 修改图书
    function update() {
        // 简单校验
        if ($("#bookName").val().trim() == "") {
            alert("图书名称不能为空！");
            return;
        }
        if ($("#bookAuthor").val().trim() == "") {
            alert("图书作者不能为空！");
            return;
        }
        $.ajax({
            type: "POST",
            url: "/book/updateBook",
            data: $("#updateBook").serialize(),
            success: function (result) {
                if (result == "") {
                    alert("修改成功！");
                    location.href = "book_list.html";
                } else {
                    alert(result);
                }
            },
            error: function () {
                alert("修改失败，请稍后重试！");
            }
        });
    }
</script>
