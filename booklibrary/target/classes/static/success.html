<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>登录成功</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>

<h2>✅ 登录成功！</h2>
<p id="welcome">加载中...</p>
<a href="/login.html">返回登录</a>

<script>
    // 获取当前登录用户名
    $.ajax({
        url: "/user/getLogin",
        type: "get",
        success: function(name) {
            if (name && name !== 'null') {
                $("#welcome").text("欢迎回来，" + name + "！");
            }
        }
    });
</script>

</body>
</html>
