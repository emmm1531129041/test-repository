<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图书列表展示</title>

    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/list.css">

    <script src="js/jquery.min.js"></script>
    <script src="js/bootstrap.min.js"></script>
    <script src="js/jq-paginator.js"></script>
</head>

<body>

<div class="bookContainer">

    <h2>图书列表展示</h2>

    <div class="navbar-justify-between">
        <div>
            <button class="btn btn-outline-info"
                    onclick="location.href='book_add.html'">
                添加图书
            </button>

            <button class="btn btn-outline-info"
                    onclick="batchDelete()">
                批量删除
            </button>
        </div>
    </div>

    <table>

        <thead>
        <tr>
            <td>选择</td>
            <td class="width100">图书ID</td>
            <td>书名</td>
            <td>作者</td>
            <td>数量</td>
            <td>价格</td>
            <td>出版社</td>
            <td>状态</td>
            <td class="width200">操作</td>
        </tr>
        </thead>

        <tbody id="bookTableBody">

        </tbody>

    </table>

    <div class="demo">
        <ul id="pageContainer"
            class="pagination justify-content-center">
        </ul>
    </div>

</div>

<script>

    // 当前页
    let currentPage = 1;

    // 每页条数
    const pageSize = 10;

    // 页面初始化
    getBookList(currentPage);

    function getBookList(page) {

        $.ajax({

            type: "GET",

            url: "/book/getListByPage",

            data: {
                currentPage: page,
                pageSize: pageSize
            },

            success: function (result) {

                if (result == null) {
                    return;
                }

                let books = result.records;
                let total = result.total;

                let html = "";

                if (books != null) {

                    for (let book of books) {

                        html += "<tr>";

                        html += "<td>";
                        html += "<input type='checkbox' class='book-select' name='selectBook' value='" + book.id + "'>";
                        html += "</td>";

                        html += "<td>" + book.id + "</td>";

                        html += "<td>" + book.bookName + "</td>";

                        html += "<td>" + book.author + "</td>";

                        html += "<td>" + book.count + "</td>";

                        html += "<td>" + book.price + "</td>";

                        html += "<td>" + book.publish + "</td>";

                        // 后端已经转换好了中文状态
                        html += "<td>" + book.statusCN + "</td>";

                        html += "<td>";
                        html += "<div class='op'>";

                        html += "<a href='book_update.html?bookId=" + book.id + "'>修改</a>";

                        html += "<a href='javascript:void(0)' onclick='deleteBook(" + book.id + ")'>删除</a>";

                        html += "</div>";
                        html += "</td>";

                        html += "</tr>";

                    }

                }

                $("#bookTableBody").html(html);

                // 第一次加载分页器
                $("#pageContainer").jqPaginator({

                    totalCounts: total,

                    pageSize: pageSize,

                    visiblePages: 5,

                    currentPage: page,

                    first: '<li class="page-item"><a class="page-link">首页</a></li>',

                    prev: '<li class="page-item"><a class="page-link">上一页</a></li>',

                    next: '<li class="page-item"><a class="page-link">下一页</a></li>',

                    last: '<li class="page-item"><a class="page-link">尾页</a></li>',

                    page: '<li class="page-item"><a class="page-link">{{page}}</a></li>',

                    onPageChange: function (num, type) {

                        if (type === "change") {

                            currentPage = num;

                            getBookList(num);

                        }

                    }

                });

            },

            error: function () {

                alert("获取图书列表失败！");

            }

        });

    }

    // 删除（目前还是模拟）
    function deleteBook(id) {

        if (confirm("确认删除图书吗？")) {

            alert("删除接口还没有写，当前只是模拟。");

        }

    }

    // 批量删除（目前还是模拟）
    function batchDelete() {

        let ids = [];

        $("input[name='selectBook']:checked").each(function () {

            ids.push($(this).val());

        });

        if (ids.length === 0) {

            alert("请选择要删除的图书");

            return;

        }

        alert("批量删除接口还没有写。\n选中了：" + ids.join(","));

    }

</script>

</body>

</html>
