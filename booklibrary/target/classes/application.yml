spring:
  application:
    name: book_library
  datasource:
    url: jdbc:mysql://localhost:3306/book_test?useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  file:
    name: spring-book.log
  level:
    org.example.demo1.dao: debug

server:
  port: 8080