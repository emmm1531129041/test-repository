<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>博客详情页</title>

    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/detail.css">

</head>

<body>

<div class="nav">
    <img src="pic/logo2.jpg" alt="">
    <span class="blog-title">我的博客系统</span>

    <div class="space"></div>

    <a class="nav-span" href="blog_list.html">主页</a>
    <a class="nav-span" href="blog_edit.html">写博客</a>
    <a class="nav-span" href="#" onclick="logout()">注销</a>
</div>


<div class="container">

    <div class="left">
        <div class="card">

            <img src="pic/doge.jpg" alt="">

            <h3>汤老师</h3>

            <a href="#">GitHub 地址</a>

            <div class="row">
                <span>文章</span>
                <span>分类</span>
            </div>

            <div class="row">
                <span>2</span>
                <span>1</span>
            </div>

        </div>
    </div>


    <div class="right">

        <div class="content">

            <!-- 修改1：这里原来的固定文字改成动态填充 -->
            <div class="title" id="title"></div>

            <!-- 修改2：日期从后端updateTime获取 -->
            <div class="date" id="date"></div>

            <!-- 修改3：博客正文从数据库读取 -->
            <div class="detail" id="content"></div>

            <div class="operating">

                <button onclick="updateBlog()">编辑</button>

                <button onclick="deleteBlog()">删除</button>

            </div>
        </div>

    </div>


</div>


<!-- editor.md依赖 -->
<link rel="stylesheet" href="blog-editormd/css/editormd.css"/>
<script src="js/jquery.min.js"></script>
<script src="blog-editormd/lib/marked.min.js"></script>
<script src="blog-editormd/lib/prettify.min.js"></script>
<script src="blog-editormd/editormd.js"></script>
<script src="js/common.js"></script>
<script>

    // 页面加载完成后执行
    $(function(){
        // 修改4：从地址栏获取博客id
        // 例如：
        // blog_detail.html?blogId=1
        let blogId = new URLSearchParams(location.search)
            .get("blogId");
        // 调用后端获取博客详情
        $.ajax({
            type:"GET",
            // 对应你的Controller:
            // @RequestMapping("/blog")
            // @GetMapping("/getBlogDetail")
            url:"/blog/getBlogDetail",
            data:{
                blogId:blogId
            },
            success:function(blog){
                console.log("博客详情:",blog);
                // 后端返回 BlogInfoResponse
                // 直接使用 blog.xxx
                // 因为你的接口没有Result包装
                $("#title").text(blog.title);
                $("#date").text(blog.updateTime);
                // content可能包含html标签
                // 所以使用html()
                $("#content").html(blog.content);
            },
            error:function(){
                alert("获取博客详情失败");
            }
        });
    });

    // 编辑博客
    function updateBlog(){
        let blogId = new URLSearchParams(location.search)
            .get("blogId");
        // 后面做修改页面时使用
        window.location.href =
            "blog_update.html?blogId=" + blogId;
    }
    // 删除博客(暂时保留)
    function deleteBlog(){
        alert("删除博客");
    }

</script>

</body>

</html>
