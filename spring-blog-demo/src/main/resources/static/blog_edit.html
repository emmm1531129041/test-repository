<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>博客编辑页</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/edit.css">
    <link rel="stylesheet" href="blog-editormd/css/editormd.css">
</head>

<body>

<!-- 导航栏 -->
<div class="nav">
    <img src="pic/logo2.jpg" alt="">
    <span class="blog-title">我的博客系统</span>
    <div class="space"></div>
    <a class="nav-span" href="blog_list.html">主页</a>
    <a class="nav-span" href="blog_edit.html">写博客</a>
    <a class="nav-span" href="#" onclick="logout()">注销</a>
</div>

<!-- 编辑区域 -->
<div class="content-edit">
    <div class="push">
        <input type="text" id="title">
        <input type="button" value="发布文章" id="publishBtn" onclick="publishBlog()">
    </div>

    <!-- Markdown编辑器 -->
    <div id="editor">
        <textarea id="content" style="display:none;" name="content">##在这里写下一篇博客</textarea>
    </div>

</div>

<script src="js/jquery.min.js"></script>
<script src="blog-editormd/editormd.min.js"></script>
<script src="js/common.js"></script>

<script>

    //初始化Markdown编辑器
    $(function(){
        editormd("editor",{
            width:"100%",
            height:"550px",
            path:"blog-editormd/lib/"
        });
    });


    //发布博客
    function publishBlog(){

        //封装博客数据
        let blogData={
            userId:localStorage.getItem("login_userid"),
            title:$("#title").val(),
            content:$("#content").val()
        };

        //发送请求
        $.ajax({
            type:"post",
            url:"/blog/add",
            contentType:"application/json",
            data:JSON.stringify(blogData),

            //请求成功
            success:function(result){
                console.log(result);

                if(result!=null&&result.code==200&&result.data==true){
                    alert("发布成功");
                    location.href="blog_list.html";
                }else{
                    alert(result.errMsg);
                }
            },

            //请求失败
            error:function(xhr){
                console.log(xhr);
                alert("请求失败");
            }
        });
    }

</script>

</body>
</html>
